name: CI

# Unit 6 criterion: D.P8 — continuous integration.
# Runs on every push/PR: installs dependencies and builds the production bundle.
# If the build breaks, the pipeline goes red before anything reaches the server.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
