# Atlas Apparel CRM — Nginx reverse proxy with HTTPS
# Unit 6 criteria: C.P6 (deployment) + B.P4 (HTTPS for remote clients)
#
# Install to: /etc/nginx/sites-available/atlas-crm
# Enable with: sudo ln -s /etc/nginx/sites-available/atlas-crm /etc/nginx/sites-enabled/
# Replace crm.example.com with your real domain, then run certbot (see README).
#
# Nginx terminates TLS on 443 and proxies to the Next.js process on 127.0.0.1:3000.
# Port 3000 is NOT exposed to the internet (no security-group rule for it).

# HTTP :80 — allow certbot's ACME challenge, redirect everything else to HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name crm.example.com;

    # Let's Encrypt / certbot HTTP-01 challenge
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS :443 — the real app
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name crm.example.com;

    # Certificate paths are created by: sudo certbot --nginx -d crm.example.com
    ssl_certificate     /etc/letsencrypt/live/crm.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/crm.example.com/privkey.pem;

    # Sensible TLS defaults
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Proxy to the Next.js server
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";
        proxy_read_timeout 60s;
    }
}
